name: Check

on:
  push:
    branches: [main]

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npm run build
        env:
          KV_REST_API_URL: ${{ secrets.KV_REST_API_URL || 'https://stub.upstash.io' }}
          KV_REST_API_TOKEN: ${{ secrets.KV_REST_API_TOKEN || 'stub_token' }}
          BLOB_READ_WRITE_TOKEN: ${{ secrets.BLOB_READ_WRITE_TOKEN || 'stub_token' }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL || 'https://stub.discord.com' }}
